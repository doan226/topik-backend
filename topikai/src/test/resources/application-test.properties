spring.datasource.url=jdbc:h2:mem:topik_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

seed.test-users=false
casso.secure-token=test-casso-token
jwt.secret=topik-test-jwt-secret-min-32-characters-long
dictionary.sqlite.path=data/dictionary-missing-test.db
