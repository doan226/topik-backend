spring.application.name=topikai

# Port: dat bien moi truong PORT=8081 neu 8080 da bi chiem (hoac dung scripts/run-backend.ps1)
server.port=${PORT:8080}

# ==========================================
# CẤU HÌNH DATABASE (Tự động thích ứng Local & Render)
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/topik_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# CẤU HÌNH GEMINI API
# ==========================================
gemini.api.key=${GEMINI_API_KEY:}

# ==========================================
# CẤU HÌNH GIỚI HẠN KẾT NỐI CHO DATABASE FREE
# ==========================================
# Cài đặt tối đa chỉ được mở 3 kết nối cùng lúc (để không bị vượt quá giới hạn 5)
spring.datasource.hikari.maximum-pool-size=3
# Số lượng kết nối tối thiểu luôn giữ trạng thái chờ
spring.datasource.hikari.minimum-idle=1
# Tự động đóng kết nối nếu không ai dùng trong 10 giây (giải phóng tài nguyên)
spring.datasource.hikari.idle-timeout=30000
# Vong doi ket noi (ms) — phai lon hon idle-timeout de tranh canh bao Hikari
spring.datasource.hikari.max-lifetime=600000

# ==========================================
# CẤU HÌNH GỬI MAIL BREVO API (MỚI)
# ==========================================
# Render sẽ tự động bơm giá trị từ mục Environment vào đây
# ==========================================
# CẤU HÌNH GỬI MAIL BREVO API (MỚI)
# ==========================================
# SỬA LẠI THÀNH CÚ PHÁP CÓ DẤU HAI CHẤM (:) VÀ GIÁ TRỊ TẠM THỜI ĐỂ TRÁNH LỖI NULL
brevo.api.key=${BREVO_API_KEY:tam_thoi_de_trong}
brevo.sender.email=${BREVO_SENDER_EMAIL:tam_thoi@gmail.com}

