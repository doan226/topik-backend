# Giới hạn pool size nhỏ hơn giới hạn của DB (ví dụ: 4)
# ==========================================
# CẤU HÌNH GIỚI HẠN KẾT NỐI CHO DATABASE FREE
# ==========================================
# Cài đặt tối đa chỉ được mở 3 kết nối cùng lúc (để không bị vượt quá giới hạn 5)
spring.datasource.hikari.maximum-pool-size=3

# Số lượng kết nối tối thiểu luôn giữ trạng thái chờ
spring.datasource.hikari.minimum-idle=1

# Tự động đóng kết nối nếu không ai dùng trong 10 giây (giải phóng tài nguyên)
spring.datasource.hikari.idle-timeout=10000

# Vòng đời tối đa của một kết nối là 30 giây
spring.datasource.hikari.max-lifetime=30000

